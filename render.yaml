services:
  # Backend API service
  - type: web
    name: gridlock-backend-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: DATABASE_URL
        value: sqlite:///./gridlockp.db
      - key: OSRM_URL
        value: http://router.project-osrm.org/route/v1/driving/
      - key: ALLOWED_ORIGINS
        value: "*"

  # Frontend web interface service
  - type: web
    name: gridlock-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://gridlockround2-i3um.onrender.com/api
      - key: NEXT_PUBLIC_MAPMYINDIA_KEY
        value: tqaqwbbmicdlewwuyzppimsrhywtgoyindbz
